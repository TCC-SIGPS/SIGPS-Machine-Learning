# SIGPS Machine Learning — PRODUÇÃO (container/imagem: sigps-ml)
# Uso: cd SIGPS-Machine-Learning && docker compose -f docker-compose.prod.yml up -d --build

services:
  sigps-ml:
    build: .
    image: sigps-ml:${TAG:-latest}
    container_name: sigps-ml
    restart: always
    expose:
      - "8000"
    volumes:
      # Atualize o modelo na VPS sem rebuild: copie model.pkl e reinicie o container
      - ./artifacts/model.pkl:/app/artifacts/model.pkl:ro
    networks:
      - sigps-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  sigps-network:
    name: sigps-network
    driver: bridge
